<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Rockets Auto Electrics</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css?v=5">
</head>
<body>
<div class="wrap" style="padding:2rem 24px; max-width:900px;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
    <img src="../assets/logo.jpg" alt="Rockets Auto Electrics" style="height:44px;">
    <button id="logoutBtn" class="btn btn-outline">Log Out</button>
  </div>

  <p class="eyebrow">ADMIN DASHBOARD</p>
  <h1 class="section-title" style="font-size:1.8rem;">Post a job or add a review</h1>
  <p id="statusNote" style="color:var(--grey); margin-bottom:2rem;"></p>

  <!-- ADD JOB POST -->
  <div style="background:#fff; border:1px solid var(--line); border-radius:8px; padding:1.6rem; margin-bottom:2rem;">
    <h2 style="font-size:1.2rem; margin-top:0;">Add a job post</h2>
    <form id="jobForm">
      <div class="form-field" style="margin-bottom:1rem;">
        <label style="color:var(--asphalt)">Title</label>
        <input type="text" id="jobTitle" required style="border:1px solid var(--line); background:#fff; color:var(--asphalt);" placeholder="e.g. Alternator swap, Buderim">
      </div>
      <div class="form-field" style="margin-bottom:1rem;">
        <label style="color:var(--asphalt)">Message</label>
        <textarea id="jobMessage" rows="3" required style="border:1px solid var(--line); background:#fff; color:var(--asphalt);" placeholder="What was the job?"></textarea>
      </div>
      <div class="form-field" style="margin-bottom:1rem;">
        <label style="color:var(--asphalt)">Photo</label>
        <input type="file" id="jobPhoto" accept="image/*" required>
      </div>
      <button type="submit" class="btn btn-primary">Post Job</button>
      <p id="jobNote" style="margin-top:0.8rem; font-size:0.88rem; color:var(--orange);"></p>
    </form>
  </div>

  <!-- ADD REVIEW -->
  <div style="background:#fff; border:1px solid var(--line); border-radius:8px; padding:1.6rem; margin-bottom:2rem;">
    <h2 style="font-size:1.2rem; margin-top:0;">Add a review</h2>
    <form id="reviewForm">
      <div class="form-field" style="margin-bottom:1rem;">
        <label style="color:var(--asphalt)">Customer name</label>
        <input type="text" id="reviewAuthor" required style="border:1px solid var(--line); background:#fff; color:var(--asphalt);">
      </div>
      <div class="form-field" style="margin-bottom:1rem;">
        <label style="color:var(--asphalt)">Rating (1-5)</label>
        <input type="number" id="reviewRating" min="1" max="5" value="5" required style="border:1px solid var(--line); background:#fff; color:var(--asphalt); max-width:100px;">
      </div>
      <div class="form-field" style="margin-bottom:1rem;">
        <label style="color:var(--asphalt)">Review text</label>
        <textarea id="reviewText" rows="3" required style="border:1px solid var(--line); background:#fff; color:var(--asphalt);"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Add Review</button>
      <p id="reviewNote" style="margin-top:0.8rem; font-size:0.88rem; color:var(--orange);"></p>
    </form>
  </div>
</div>

<script>
const apiBase = localStorage.getItem('rockets_api_base');
if (!apiBase) window.location.href = 'login.html';

(async function checkSession() {
  try {
    const res = await fetch(apiBase + '/api/session', { credentials: 'include' });
    const data = await res.json();
    if (!data.authenticated) window.location.href = 'login.html';
    else document.getElementById('statusNote').textContent = 'Logged in. Changes here go live on the site within a minute or two.';
  } catch (e) {
    document.getElementById('statusNote').textContent = 'Could not verify login — backend may be waking up, try refreshing.';
  }
})();

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch(apiBase + '/api/logout', { method: 'POST', credentials: 'include' });
  window.location.href = 'login.html';
});

document.getElementById('jobForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const note = document.getElementById('jobNote');
  note.style.color = 'var(--orange)';
  note.textContent = 'Uploading…';
  const formData = new FormData();
  formData.append('title', document.getElementById('jobTitle').value);
  formData.append('message', document.getElementById('jobMessage').value);
  formData.append('photo', document.getElementById('jobPhoto').files[0]);
  try {
    const res = await fetch(apiBase + '/api/jobs', { method: 'POST', credentials: 'include', body: formData });
    const data = await res.json();
    if (res.ok && data.ok) {
      note.style.color = 'green';
      note.textContent = 'Posted! It will appear on the Recent Jobs page shortly.';
      e.target.reset();
    } else {
      note.textContent = data.error || 'Failed to post job.';
    }
  } catch (err) {
    note.textContent = 'Could not reach the backend.';
  }
});

document.getElementById('reviewForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const note = document.getElementById('reviewNote');
  note.style.color = 'var(--orange)';
  note.textContent = 'Saving…';
  try {
    const res = await fetch(apiBase + '/api/reviews', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        author: document.getElementById('reviewAuthor').value,
        rating: document.getElementById('reviewRating').value,
        text: document.getElementById('reviewText').value
      })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      note.style.color = 'green';
      note.textContent = 'Review added!';
      e.target.reset();
    } else {
      note.textContent = data.error || 'Failed to add review.';
    }
  } catch (err) {
    note.textContent = 'Could not reach the backend.';
  }
});
</script>
</body>
</html>
